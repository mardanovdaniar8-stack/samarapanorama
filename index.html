<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Самара VR · Виртуальные экскурсии</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            width: 100%;
            flex: 1;
        }
        .selection-view { display: block; }
        .player-view {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100;
        }
        .player-view.active { display: block; }
        .greeting { margin-bottom: 2rem; }
        .greeting h1 { font-size: 2.2rem; font-weight: 700; }
        .greeting .user-name { color: #007aff; }
        .greeting p { font-size: 1.2rem; color: #6e6e73; margin-top: 0.3rem; }
        .section-title { font-size: 1.6rem; font-weight: 600; margin-bottom: 1.5rem; }
        .routes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }
        .route-card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
            overflow: hidden;
            display: flex;
            height: 200px;              /* было 180px → больше места для описания */
            border: 1px solid #e8e8ed;
            transition: transform 0.2s;
        }
        .route-card:hover { transform: translateY(-2px); }
        .card-img {
            width: 33.333%;
            background-color: #f0f0f3;
            background-size: cover;
            background-position: center;
        }
        .card-content {
            width: 66.666%;
            padding: 1rem 1rem;        /* уменьшил паддинг, чтобы выиграть место */
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-weight: 700;
            font-size: 1.2rem;         /* чуть меньше, чтобы освободить пространство */
            margin-bottom: 0.2rem;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-desc {
            font-size: 0.8rem;
            color: #6e6e73;
            margin-bottom: 0.4rem;
            /* гарантируем хотя бы одну строку */
            min-height: 1.6em;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }
        .card-duration {
            font-size: 0.9rem;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 0.5rem;
        }
        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0.5rem;
        }
        .progress-bar-bg {
            flex: 1;
            height: 5px;
            background: #e8e8ed;
            border-radius: 100px;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #007aff;
            border-radius: 100px;
        }
        .progress-text {
            font-size: 0.7rem;
            color: #6e6e73;
            min-width: 38px;
            text-align: right;
        }
        .start-btn {
            background: #007aff;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 8px 0;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            width: 100%;
            margin-top: auto;
        }
        .start-btn:hover { background: #005bbf; }

        /* плеер */
        .player-header {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 200;
        }
        .back-btn {
            background: rgba(30,30,30,0.7);
            backdrop-filter: blur(8px);
            color: white;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 40px;
            padding: 10px 20px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .player-frame {
            width: 100%; height: 100%;
            border: none; display: block;
        }

        /* финальный слайд */
        .finish-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }
        .finish-card {
            background: #1c1c1e;
            border-radius: 32px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #3a3a3c;
        }
        .finish-icon { font-size: 64px; margin-bottom: 20px; }
        .finish-preview {
            width: 100%;
            height: 160px;
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            margin-bottom: 24px;
            background-color: #2c2c2e;
        }
        .finish-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .finish-desc { font-size: 16px; color: #98989e; margin-bottom: 24px; }
        .finish-progress { margin-bottom: 30px; }
        .finish-progress .progress-bar-bg { background: #3a3a3c; margin-bottom: 8px; }
        .finish-progress .progress-text { color: #fff; font-size: 1rem; }
        .finish-btn {
            background: #007aff;
            border: none;
            color: white;
            font-weight: 600;
            padding: 16px 32px;
            border-radius: 40px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
        }

        .empty-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 28px;
            color: #86868b;
        }
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 5px solid rgba(0,122,255,0.2);
            border-top-color: #007aff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app" id="appContainer">
    <div id="selectionView" class="selection-view">
        <div class="greeting">
            <h1>Привет, <span class="user-name" id="userNameDisplay">Гость</span>!</h1>
            <p>Давайте проведем виртуальную экскурсию.</p>
        </div>
        <h2 class="section-title">Выберите маршрут</h2>
        <div id="routesContainer" class="routes-grid">
            <div class="empty-message">Загрузка маршрутов...</div>
        </div>
    </div>
</div>

<div id="playerView" class="player-view">
    <div class="player-header">
        <button class="back-btn" id="backToMenuBtn">← Вернуться в меню</button>
    </div>
    <iframe id="routeIframe" class="player-frame" allow="fullscreen" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>

    <div id="finishOverlay" class="finish-overlay hidden">
        <div class="finish-card">
            <div class="finish-icon">🏁</div>
            <div id="finishPreview" class="finish-preview"></div>
            <div id="finishTitle" class="finish-title"></div>
            <div id="finishDesc" class="finish-desc"></div>
            <div class="finish-progress">
                <div class="progress-bar-bg">
                    <div id="finishProgressFill" class="progress-bar-fill" style="width:100%"></div>
                </div>
                <div class="progress-text" id="finishProgressText"></div>
            </div>
            <button class="finish-btn" id="finishBackBtn">Вернуться в меню</button>
        </div>
    </div>
</div>

<div id="globalLoader" class="loading-overlay hidden">
    <div class="spinner"></div>
</div>

<script>
    (function(){
        const API_BASE = '/api';
        const ROUTE_BASE = '/route';
        let routesData = [];
        let currentRouteId = null;
        let currentRoute = null;
        let progressInterval = null;

        const selectionView = document.getElementById('selectionView');
        const playerView = document.getElementById('playerView');
        const routesContainer = document.getElementById('routesContainer');
        const routeIframe = document.getElementById('routeIframe');
        const backBtn = document.getElementById('backToMenuBtn');
        const finishOverlay = document.getElementById('finishOverlay');
        const finishBackBtn = document.getElementById('finishBackBtn');
        const globalLoader = document.getElementById('globalLoader');
        const userNameSpan = document.getElementById('userNameDisplay');

        const finishPreview = document.getElementById('finishPreview');
        const finishTitle = document.getElementById('finishTitle');
        const finishDesc = document.getElementById('finishDesc');
        const finishProgressText = document.getElementById('finishProgressText');

        const USER_NAME = 'Исследователь';
        userNameSpan.textContent = USER_NAME;

        function showLoader(s) { globalLoader.classList.toggle('hidden', !s); }

        function getStoredProgress(id) {
            const v = localStorage.getItem(`route_progress_${id}`);
            return v ? parseInt(v,10) : 0;
        }
        function setStoredProgress(id, val) {
            localStorage.setItem(`route_progress_${id}`, val);
        }
        function calcPercent(c, t) { return t ? Math.min(100, Math.round((c/t)*100)) : 0; }

        async function fetchRoutes() {
            showLoader(true);
            try {
                const res = await fetch(`${API_BASE}/routes`);
                const data = await res.json();
                routesData = data.routes || [];
                renderCards();
            } catch(e) {
                routesContainer.innerHTML = `<div class="empty-message">⚠️ Ошибка загрузки</div>`;
            } finally { showLoader(false); }
        }

        function renderCards() {
            if(!routesData.length) {
                routesContainer.innerHTML = `<div class="empty-message">Маршруты не найдены.<br>Добавьте .irf в папку routes/</div>`;
                return;
            }
            let html = '';
            routesData.forEach(r => {
                const comp = getStoredProgress(r.id);
                const perc = calcPercent(comp, r.totalSlides||0);
                // Картинка-превью
                let imgStyle = '';
                if (r.pic) {
                    const imgUrl = `${ROUTE_BASE}/${encodeURIComponent(r.id)}/assets/${encodeURIComponent(r.pic)}`;
                    imgStyle = `background-image: url('${imgUrl}');`;
                }
                // Если описание пустое — покажем placeholder
                const desc = r.desc ? escapeHtml(r.desc) : 'Описание скоро появится';
                html += `
                    <div class="route-card">
                        <div class="card-img" style="${imgStyle} background-size: cover; background-position: center;"></div>
                        <div class="card-content">
                            <div class="card-title">${escapeHtml(r.name)}</div>
                            <div class="card-desc">${desc}</div>
                            <div class="card-duration">⏱ ${escapeHtml(r.time)}</div>
                            <div class="progress-wrapper">
                                <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${perc}%;"></div></div>
                                <span class="progress-text">${comp}/${r.totalSlides||0}</span>
                            </div>
                            <button class="start-btn" data-id="${r.id}">Начать маршрут</button>
                        </div>
                    </div>`;
            });
            routesContainer.innerHTML = html;
            document.querySelectorAll('.start-btn').forEach(b => b.addEventListener('click', ()=> startRoute(b.dataset.id)));
        }

        function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; }

        function startRoute(routeId) {
            const route = routesData.find(r=>r.id===routeId);
            if(!route) return;
            currentRouteId = routeId;
            currentRoute = route;
            selectionView.style.display = 'none';
            playerView.classList.add('active');
            finishOverlay.classList.add('hidden');
            routeIframe.src = `${ROUTE_BASE}/${encodeURIComponent(routeId)}/index.html`;
            showLoader(true);
            routeIframe.onload = () => {
                showLoader(false);
                injectCounterStyle();
                startProgressTracking();
            };
            routeIframe.onerror = () => { showLoader(false); alert('Ошибка загрузки маршрута'); };
        }

        function injectCounterStyle() {
            try {
                const doc = routeIframe.contentDocument || routeIframe.contentWindow.document;
                if(!doc) return;
                const style = doc.createElement('style');
                style.textContent = `
                    #progress-counter {
                        bottom: auto !important;
                        top: 20px !important;
                        right: 20px !important;
                        background: rgba(0,0,0,0.5) !important;
                        backdrop-filter: blur(4px) !important;
                        color: white !important;
                        z-index: 150 !important;
                    }
                `;
                doc.head.appendChild(style);
            } catch(e) {}
        }

        function startProgressTracking() {
            if(progressInterval) clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                try {
                    const win = routeIframe.contentWindow;
                    if(!win) return;
                    const completed = win.COMPLETED;
                    const total = win.totalSlides;
                    if(typeof completed !== 'undefined' && typeof total !== 'undefined') {
                        setStoredProgress(currentRouteId, completed);
                        if(completed >= total && total > 0) {
                            showFinishScreen();
                        }
                    }
                } catch(e) {}
            }, 800);
        }

        function showFinishScreen() {
            if(!currentRoute) return;
            stopTracking();
            finishTitle.textContent = currentRoute.name;
            finishDesc.textContent = currentRoute.desc || '';
            const comp = getStoredProgress(currentRouteId);
            const total = currentRoute.totalSlides || 0;
            finishProgressText.textContent = `${comp}/${total} · 100%`;
            if (currentRoute.pic) {
                const previewUrl = `${ROUTE_BASE}/${encodeURIComponent(currentRouteId)}/assets/${encodeURIComponent(currentRoute.pic)}`;
                finishPreview.style.backgroundImage = `url('${previewUrl}')`;
            } else {
                finishPreview.style.backgroundImage = 'none';
            }
            finishOverlay.classList.remove('hidden');
        }

        function stopTracking() {
            if(progressInterval) { clearInterval(progressInterval); progressInterval = null; }
        }

        function backToMenu() {
            stopTracking();
            routeIframe.src = 'about:blank';
            playerView.classList.remove('active');
            finishOverlay.classList.add('hidden');
            selectionView.style.display = 'block';
            renderCards();
            currentRouteId = null;
            currentRoute = null;
        }

        backBtn.addEventListener('click', backToMenu);
        finishBackBtn.addEventListener('click', backToMenu);
        window.addEventListener('keydown', e => { if(e.key==='Escape' && playerView.classList.contains('active')) backToMenu(); });
        window.addEventListener('DOMContentLoaded', fetchRoutes);
    })();
</script>
</body>
</html>
